name: Build vlmcsd for OpenWrt
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: openwrt/sdk:ath79-generic
      # Принудительно задаем пользователя root, чтобы не было проблем с правами
      options: --user root
    steps:
      - name: Build vlmcsd
        run: |
          # Устанавливаем git, если его нет в образе SDK
          opkg update && opkg install git
          
          # Скачиваем исходники напрямую, обходя actions/checkout
          git clone https://github.com/Wind4/vlmcsd.git
          cd vlmcsd
          
          # Очистка
          make clean
          
          # Сборка
          # В OpenWrt SDK переменная CC уже настроена под кросс-компилятор
          # Флаг -static нужен для того, чтобы не зависеть от библиотек системы
          make CC=mips-openwrt-linux-musl-gcc CFLAGS="-static -Os -D_GNU_SOURCE" vlmcsd
          
          # Проверяем, что получилось
          ./vlmcsd -V || true
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vlmcsd-mips-openwrt
          path: vlmcsd/vlmcsd

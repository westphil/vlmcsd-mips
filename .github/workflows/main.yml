name: Build vlmcsd MIPS Final
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: dockcross/linux-mips:latest
    steps:
      - name: Checkout and Build
        run: |
          # 1. Склонировали
          git clone https://github.com/Wind4/vlmcsd.git vlmcsd
          
          # 2. Зашли в папку
          cd vlmcsd
          
          # 3. Теперь делаем clean и билд
          make clean
          make CC=mips-linux-gnu-gcc CFLAGS="-static -Os -msoft-float -EB -D_GNU_SOURCE" LDFLAGS="-static -EB" vlmcsd
          
          # 4. Проверка (если упадет здесь, увидим в логах)
          ./vlmcsd/vlmcsd -V || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vlmcsd-mips-dockcross
          path: vlmcsd/vlmcsd

name: Build MIPS vlmcsd
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-mips-linux-gnu
      - name: Build
        run: |
          git clone https://github.com/Wind4/vlmcsd.git
          cd vlmcsd
          # -msoft-float: Убирает FPU-инструкции
          # -static: Оставляем статику
          # -EB: Big Endian
          make CC=mips-linux-gnu-gcc CFLAGS="-static -Os -msoft-float -EB -D_GNU_SOURCE" LDFLAGS="-static -EB"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vlmcsd-mips-static
          path: vlmcsd/bin/vlmcsd

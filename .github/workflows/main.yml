name: Build MIPS vlmcsd
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-mips-linux-gnu
      - name: Build
        run: |
          git clone https://github.com/Wind4/vlmcsd.git
          cd vlmcsd
          # Очистка перед сборкой
          make clean
          # Собираем только vlmcsd, игнорируя всё остальное
          # Флаги передаем в переменных, чтобы Makefile их корректно подхватил
          make CC=mips-linux-gnu-gcc CFLAGS="-static -Os -msoft-float -EB -D_GNU_SOURCE" LDFLAGS="-static -EB" vlmcsd
      - name: Verify
        run: |
          file vlmcsd/vlmcsd
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vlmcsd-mips-static
          path: vlmcsd/vlmcsd

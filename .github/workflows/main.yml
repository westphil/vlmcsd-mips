name: Build vlmcsd MIPS Final
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: dockcross/linux-mips:latest
      options: --user root
    steps:
      - name: Git Fix
        run: git config --global --add safe.directory '*'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          # Переходим в src, так как там лежат исходники и GNUmakefile
          cd src
          
          # Убираем все попытки make clean, чтобы не было "No rule"
          # Используем CROSS_COMPILE, это стандарт для dockcross
          # CC указываем прямо на компилятор, который есть в PATH
          make CC=mips-linux-gnu-gcc CROSS_COMPILE=mips-linux-gnu- CFLAGS="-static -Os -msoft-float -EB -D_GNU_SOURCE" LDFLAGS="-static -EB" vlmcsd
          
          # Проверка результата
          ls -l ../bin/vlmcsd

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vlmcsd-mips-final
          path: bin/vlmcsd

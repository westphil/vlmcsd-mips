name: Build vlmcsd Final
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: dockcross/linux-mips:latest
      options: --user root
    steps:
      - name: Git Fix
        run: git config --global --add safe.directory '*'
        
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Build
        run: |
          # Очистка
          make clean
          
          # CC=gcc переопределяет "мудреные" имена компиляторов в Makefile
          # В dockcross gcc уже настроен под MIPS
          make CC=gcc CFLAGS="-static -Os -msoft-float -EB -D_GNU_SOURCE" LDFLAGS="-static -EB" vlmcsd
          
          # Проверяем результат
          ls -l bin/vlmcsd

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vlmcsd-mips-final
          path: bin/vlmcsd

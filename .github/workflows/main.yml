name: Build MIPS vlmcsd
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-mips-linux-gnu
      - name: Build
        run: |
          git clone https://github.com/Wind4/vlmcsd.git
          cd vlmcsd
          # Добавляем специфичные флаги для mips_24kc (ath79)
          # -march=mips32r2 -mtune=24kc — это то, что нужно для твоего AR9341
          # -EB — принудительно Big Endian
          make CC=mips-linux-gnu-gcc CFLAGS="-static -Os -D_GNU_SOURCE -march=mips32r2 -mtune=24kc -EB" LDFLAGS="-static -EB"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vlmcsd-mips-static
          path: vlmcsd/bin/vlmcsd

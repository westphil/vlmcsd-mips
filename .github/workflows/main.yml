name: Build vlmcsd MIPS Final
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: openwrt/sdk:ath79-generic
      options: --user root
    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        run: |
          # 1. Ищем папку src, где бы она ни была
          SRC_DIR=$(find . -type d -name "src" | head -n 1)
          
          if [ -z "$SRC_DIR" ]; then
            echo "Ошибка: папка src не найдена. Вот что есть:"
            ls -R
            exit 1
          fi
          
          echo "Переходим в: $SRC_DIR"
          cd "$SRC_DIR"
          
          # 2. Собираем именно тут. 
          # CC, CFLAGS и LDFLAGS пробрасываем напрямую
          make CC=mips-openwrt-linux-musl-gcc CFLAGS="-static -Os -D_GNU_SOURCE" LDFLAGS="-static"
          
          # 3. Проверка
          if [ -f "vlmcsd" ]; then
             echo "УСПЕХ: vlmcsd найден."
          else
             echo "Ошибка: бинарник не создан."
             exit 1
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vlmcsd-mips-final
          path: "**/vlmcsd"

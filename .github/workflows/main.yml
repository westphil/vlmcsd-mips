name: Build MIPS vlmcsd
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-mips-linux-gnu
      - name: Build
        run: |
          git clone https://github.com/Wind4/vlmcsd.git
          cd vlmcsd
          make clean
          # Главная магия здесь:
          # -msoft-float: заставляет компилятор не использовать FPU (избавляет от Illegal instruction)
          # -march=mips32r2 -mtune=24kc: архитектура твоего процессора AR9341
          # -EB: Big Endian (стандарт для TP-Link)
          make CC=mips-linux-gnu-gcc CFLAGS="-static -Os -msoft-float -march=mips32r2 -mtune=24kc -EB -D_GNU_SOURCE" LDFLAGS="-static -EB" vlmcsd
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vlmcsd-mips-final
          path: vlmcsd/vlmcsd

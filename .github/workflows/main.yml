name: Build vlmcsd MIPS Final
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: dockcross/linux-mips:latest
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Flatten and Build
        run: |
          # Сваливаем все исходники в одну папку, чтобы не париться с путями
          find . -name "*.c" -exec cp {} . \;
          find . -name "*.h" -exec cp {} . \;
          find . -name "GNUmakefile" -exec cp {} . \;
          
          # Собираем тут же
          make CC=mips-linux-gnu-gcc CFLAGS="-static -Os -msoft-float -EB -D_GNU_SOURCE" LDFLAGS="-static -EB" vlmcsd
          
          # Если не получилось, попробуем еще раз через явный вызов src
          if [ ! -f "vlmcsd" ]; then
             make -C src CC=mips-linux-gnu-gcc CFLAGS="-static -Os -msoft-float -EB -D_GNU_SOURCE" LDFLAGS="-static -EB" vlmcsd
             cp src/vlmcsd .
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vlmcsd-mips-final
          path: vlmcsd

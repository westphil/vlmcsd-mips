name: Build vlmcsd for OpenWrt
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      # Официальный SDK для ath79
      image: openwrt/sdk:ath79-generic
      # Запускаем от root, чтобы не было проблем с правами при сборке
      options: --user root
    steps:
      # Используем v4, он умеет обходить проблемы с правами
      - uses: actions/checkout@v4
      
      - name: Build
        run: |
          # В SDK все нужные компиляторы уже лежат в PATH
          # Нам не нужны сторонние gcc-mips, используем родной
          make clean
          # CFLAGS="-static" гарантирует, что библиотеки будут внутри
          make CC=mips-openwrt-linux-musl-gcc CFLAGS="-static -Os -D_GNU_SOURCE" LDFLAGS="-static" vlmcsd
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vlmcsd-mips-openwrt
          path: bin/vlmcsd

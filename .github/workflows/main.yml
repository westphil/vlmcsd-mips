name: Build vlmcsd for OpenWrt
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: openwrt/sdk:ath79-generic
      options: --user root
    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        run: |
          # 1. Диагностика: покажи, где мы и что вокруг
          pwd
          ls -F
          
          # 2. Ищем файл сборки и выполняем
          # Пробуем найти GNUmakefile или Makefile в текущей папке или подпапках
          if [ -f "GNUmakefile" ]; then
             make clean || true
             make CC=mips-openwrt-linux-musl-gcc CFLAGS="-static -Os -D_GNU_SOURCE" LDFLAGS="-static" vlmcsd
          else
             echo "GNUmakefile не найден в корне, ищем глубже..."
             cd $(find . -maxdepth 2 -name "GNUmakefile" -exec dirname {} \;)
             make clean || true
             make CC=mips-openwrt-linux-musl-gcc CFLAGS="-static -Os -D_GNU_SOURCE" LDFLAGS="-static" vlmcsd
          fi
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vlmcsd-mips-openwrt
          # Ищем бинарник, куда бы его ни положил make
          path: |
            vlmcsd
            bin/vlmcsd
            **/vlmcsd

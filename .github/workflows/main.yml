name: Build vlmcsd MIPS Final
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: dockcross/linux-mips:latest
    steps:
      - name: Checkout and Build
        run: |
          # Склонировали
          git clone https://github.com/Wind4/vlmcsd.git vlmcsd
          cd vlmcsd
          
          # Очистка
          make clean
          
          # СБОРКА: не указываем CC, пусть dockcross сам подставит нужный компилятор
          # Мы только добавляем нужные нам флаги компиляции
          make CFLAGS="-static -Os -msoft-float -EB -D_GNU_SOURCE" LDFLAGS="-static -EB" vlmcsd
          
          # Проверка
          ./vlmcsd/vlmcsd -V || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vlmcsd-mips-dockcross
          path: vlmcsd/bin/vlmcsd

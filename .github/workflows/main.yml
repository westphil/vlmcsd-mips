name: Build vlmcsd MIPS Final
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: openwrt/sdk:ath79-generic
      options: --user root
    steps:
      - name: Build and everything
        run: |
          # 1. Сносим всё, что было (если было)
          rm -rf *
          
          # 2. Качаем исходники напрямую через git, минуя любые action-скрипты
          git clone https://github.com/Wind4/vlmcsd.git .
          
          # 3. Дебаг: показываем, что скачали
          echo "--- Структура после клонирования ---"
          ls -F
          
          # 4. Собираем
          # Проект vlmcsd требует делать make внутри src/
          cd src
          make CC=mips-openwrt-linux-musl-gcc CFLAGS="-static -Os -D_GNU_SOURCE" LDFLAGS="-static" vlmcsd
          
          # 5. Копируем результат в корень, чтобы артефакт его нашел
          cp vlmcsd ../vlmcsd_binary
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vlmcsd-mips-binary
          path: vlmcsd_binary

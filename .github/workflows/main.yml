name: Build vlmcsd MIPS Final
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: openwrt/sdk:ath79-generic
      options: --user root
    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        run: |
          # Никаких cd, никаких find. Просто make.
          # Если Makefile в корне - он сработает.
          make CC=mips-openwrt-linux-musl-gcc CFLAGS="-static -Os -D_GNU_SOURCE" LDFLAGS="-static" vlmcsd
          
          # Если не сработал в корне, пробуем в src (на всякий случай)
          if [ ! -f "bin/vlmcsd" ]; then
             make -C src CC=mips-openwrt-linux-musl-gcc CFLAGS="-static -Os -D_GNU_SOURCE" LDFLAGS="-static" vlmcsd
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vlmcsd-mips-final
          path: "**/vlmcsd"

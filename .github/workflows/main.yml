name: Build vlmcsd for OpenWrt
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    # Используем официальный образ SDK для архитектуры ath79 (это твой AR9341)
    container: openwrt/sdk:ath79-generic
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3
      - name: Build vlmcsd
        run: |
          # SDK уже настроен, просто собираем
          make clean
          # Используем переменные среды SDK для правильной кросс-компиляции
          make CC=mips-openwrt-linux-musl-gcc CFLAGS="-static -Os -D_GNU_SOURCE" vlmcsd
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vlmcsd-mips-openwrt
          path: vlmcsd

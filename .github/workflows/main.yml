name: Build vlmcsd MIPS Final
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: dockcross/linux-mips:latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3
      - name: Build
        run: |
          # В dockcross уже всё настроено (CC, CFLAGS и т.д.)
          # Мы просто используем их переменные окружения
          make clean
          
          # Собираем с флагами статики
          make CC=mips-linux-gnu-gcc CFLAGS="-static -Os -msoft-float -EB -D_GNU_SOURCE" LDFLAGS="-static -EB" vlmcsd
          
          # Проверка
          file vlmcsd
          ./vlmcsd -V || true
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vlmcsd-mips-dockcross
          path: vlmcsd
